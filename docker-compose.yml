services:
  postgres:
    image: postgres:16-alpine
    container_name: fisiobase-postgres
    environment:
      POSTGRES_USER: fisiobase
      POSTGRES_PASSWORD: fisiobase
      POSTGRES_DB: fisiobase_academy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fisiobase -d fisiobase_academy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fisiobase-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: fisiobase-meilisearch
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: fisiobase-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fisiobase:fisiobase@postgres:5432/fisiobase_academy?schema=public
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      API_PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
    container_name: fisiobase-admin
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3333
    ports:
      - "3000:3000"
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: fisiobase-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3333
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: fisiobase-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - admin
      - web

volumes:
  postgres-data:
  meili-data:
