services:
  redis:
    image: redis:7-alpine
    container_name: fisiobase-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: fisiobase-meilisearch
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: fisiobase-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://fisiobase:vMKDpJxSqjPQUpYoD56M@fisiobase-academy-caatdc:5432/fisiobase
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      API_PORT: 3333
      JWT_SECRET: change-me
      JWT_EXPIRES_IN: 7d
    ports:
      - "3333:3333"
    depends_on:
      redis:
        condition: service_started
      meilisearch:
        condition: service_started

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
    container_name: fisiobase-admin
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3333
    ports:
      - "3000:3000"
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: fisiobase-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3333
    ports:
      - "3001:3001"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: fisiobase-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - admin
      - web

volumes:
  meili-data:
